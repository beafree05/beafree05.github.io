<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>张舫源的网站</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">张舫源的网站</div>

      <nav class="menu">
        <button class="menu-btn active" data-page="home">首页</button>
        <button class="menu-btn" data-page="reading">阅读清单</button>
        <button class="menu-btn" data-page="todo">待办事项</button>
        <button class="menu-btn" data-page="about">关于我</button>
      </nav>
    </aside>

    <main class="main">
      <section id="home" class="page active">
        <div class="card">
          <h1>欢迎来到我的网站</h1>
          <p>这里是主页面，以后你可以从左边进入不同功能。</p>
        </div>
      </section>

      <section id="reading" class="page">
        <div class="card">
          <h2>阅读清单</h2>

          <div class="input-area">
            <input id="bookInput" type="text" placeholder="输入书名" />
            <button id="addBtn">添加</button>
          </div>

          <ul id="bookList"></ul>
        </div>
      </section>

      <section id="todo" class="page">
        <div class="card">
          <h2>待办事项</h2>
          <p>这个功能以后再扩展。</p>
        </div>
      </section>

      <section id="about" class="page">
        <div class="card">
          <h2>关于我</h2>
          <p>这里以后可以写你的个人介绍、兴趣和学习方向。</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
