<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>阅读清单</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h1 {
    margin-top: 50px;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px;
    margin-left: 5px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    margin: 10px;
    background: white;
    padding: 10px;
    border-radius: 5px;
    display: inline-block;
}

.done {
    text-decoration: line-through;
    color: gray;
}
</style>

</head>

<body>

<h1>📚 我的阅读清单</h1>

<input id="bookInput" placeholder="输入书名">
<button onclick="addBook()">添加</button>

<ul id="list"></ul>

<script>
function addBook() {
    let input = document.getElementById("bookInput");
    let bookName = input.value;

    if (bookName === "") return;

    let li = document.createElement("li");

    // 书名
    let span = document.createElement("span");
    span.textContent = bookName;

    // 点击切换已读
    span.onclick = function() {
        span.classList.toggle("done");
    };

    // 删除按钮
    let delBtn = document.createElement("button");
    delBtn.textContent = "❌";
    delBtn.onclick = function() {
        li.remove();
    };

    li.appendChild(span);
    li.appendChild(delBtn);

    document.getElementById("list").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
