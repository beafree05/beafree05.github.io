<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>阅读清单（云端版）</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px;
    margin-left: 5px;
}

li {
    margin: 10px;
    background: white;
    padding: 10px;
    border-radius: 5px;
    list-style: none;
}

.done {
    text-decoration: line-through;
    color: gray;
}
</style>

</head>

<body>

<h1>📚 云端阅读清单</h1>

<input id="bookInput" placeholder="输入书名">
<button onclick="addBook()">添加</button>

<ul id="list"></ul>

<script type="module">
// Firebase 引入
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 你的配置（已填好）
const firebaseConfig = {
  apiKey: "AIzaSyAs1iWrVR1E4IRcIPvkGrS61NmNRR3oS_0",
  authDomain: "reading-list-for-sairyushi.firebaseapp.com",
  projectId: "reading-list-for-sairyushi",
  storageBucket: "reading-list-for-sairyushi.firebasestorage.app",
  messagingSenderId: "115198998780",
  appId: "1:115198998780:web:f20f230757aa2b570cbf79"
};

// 初始化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 渲染列表
async function loadBooks() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "books"));

    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const id = docSnap.id;

        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = data.name;

        if (data.done) {
            span.classList.add("done");
        }

        // 切换已读
        span.onclick = async () => {
            await updateDoc(doc(db, "books", id), {
                done: !data.done
            });
            loadBooks();
        };

        // 删除按钮
        let delBtn = document.createElement("button");
        delBtn.textContent = "❌";
        delBtn.onclick = async () => {
            await deleteDoc(doc(db, "books", id));
            loadBooks();
        };

        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
    });
}

// 添加书
async function addBook() {
    let input = document.getElementById("bookInput");
    let bookName = input.value;

    if (bookName === "") return;

    await addDoc(collection(db, "books"), {
        name: bookName,
        done: false
    });

    input.value = "";
    loadBooks();
}

// 初始加载
loadBooks();
</script>

</body>
</html>
