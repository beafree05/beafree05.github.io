<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>阅读清单（云端版）</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 40px 20px;
}

h1 {
    margin-bottom: 30px;
}

input {
    padding: 10px;
    width: 220px;
    font-size: 16px;
}

button {
    cursor: pointer;
}

.top-controls {
    margin-bottom: 24px;
}

.top-controls button {
    padding: 10px 14px;
    margin-left: 5px;
    font-size: 14px;
}

ul {
    padding: 0;
    max-width: 760px;
    margin: 0 auto;
}

li {
    margin: 12px 0;
    background: white;
    padding: 16px;
    border-radius: 10px;
    list-style: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.book-card {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
}

.book-left {
    flex: 1;
    text-align: left;
    min-width: 0;
}

.book-name {
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
    word-break: break-word;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.action-buttons button {
    padding: 4px 8px;
    font-size: 12px;
    border: 1px solid #ccc;
    background: #fafafa;
    border-radius: 6px;
}

.book-right {
    width: 220px;
    text-align: left;
    font-size: 14px;
    color: #555;
    line-height: 1.5;
    word-break: break-word;
}

.note-title {
    font-weight: bold;
    margin-bottom: 4px;
    color: #333;
}

.note-empty {
    color: #999;
    font-style: italic;
}
</style>
</head>
<body>

<h1>张舫源的阅读清单</h1>

<div class="top-controls">
    <input id="bookInput" placeholder="输入书名">
    <button onclick="addBook()">添加</button>
</div>

<ul id="list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    updateDoc,
    query,
    orderBy,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAs1iWrVR1E4IRcIPvkGrS61NmNRR3oS_0",
    authDomain: "reading-list-for-sairyushi.firebaseapp.com",
    projectId: "reading-list-for-sairyushi",
    storageBucket: "reading-list-for-sairyushi.firebasestorage.app",
    messagingSenderId: "115198998780",
    appId: "1:115198998780:web:f20f230757aa2b570cbf79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let booksCache = [];
let unsubscribe = null;

function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    booksCache.forEach((book, index) => {
        const li = document.createElement("li");

        const card = document.createElement("div");
        card.className = "book-card";

        const left = document.createElement("div");
        left.className = "book-left";

        const name = document.createElement("div");
        name.className = "book-name";
        name.textContent = book.name;

        if (book.done) {
            name.classList.add("done");
        }

        name.onclick = async () => {
            await updateDoc(doc(db, "books", book.id), {
                done: !book.done
            });
            // 不再调用 loadBooks()，实时监听会自动更新
        };

        const actions = document.createElement("div");
        actions.className = "action-buttons";

        const editBtn = document.createElement("button");
        editBtn.textContent = "修改";
        editBtn.onclick = async () => {
            const newName = prompt("请输入新的书名：", book.name);
            if (newName === null) return;
            const trimmedName = newName.trim();
            if (trimmedName === "") return;
            await updateDoc(doc(db, "books", book.id), {
                name: trimmedName
            });
            // 不再调用 loadBooks()
        };

        const noteBtn = document.createElement("button");
        noteBtn.textContent = "备注";
        noteBtn.onclick = async () => {
            const newNote = prompt("请输入新的注释：", book.note || "");
            if (newNote === null) return;
            await updateDoc(doc(db, "books", book.id), {
                note: newNote
            });
            // 不再调用 loadBooks()
        };

        const upBtn = document.createElement("button");
        upBtn.textContent = "↑";
        upBtn.onclick = async () => {
            if (index === 0) return;
            await swapOrder(index, index - 1);
        };

        const downBtn = document.createElement("button");
        downBtn.textContent = "↓";
        downBtn.onclick = async () => {
            if (index === booksCache.length - 1) return;
            await swapOrder(index, index + 1);
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "❌";
        delBtn.onclick = async () => {
            await deleteDoc(doc(db, "books", book.id));
            await reindexOrdersAfterDelete();
            // 不再调用 loadBooks()，实时监听会自动更新
        };

        actions.appendChild(editBtn);
        actions.appendChild(noteBtn);
        actions.appendChild(upBtn);
        actions.appendChild(downBtn);
        actions.appendChild(delBtn);

        left.appendChild(name);
        left.appendChild(actions);

        const right = document.createElement("div");
        right.className = "book-right";

        const noteTitle = document.createElement("div");
        noteTitle.className = "note-title";
        noteTitle.textContent = "备注";

        const noteText = document.createElement("div");
        if (book.note && book.note.trim() !== "") {
            noteText.textContent = book.note;
        } else {
            noteText.textContent = "暂无";
            noteText.className = "note-empty";
        }

        right.appendChild(noteTitle);
        right.appendChild(noteText);

        card.appendChild(left);
        card.appendChild(right);
        li.appendChild(card);
        list.appendChild(li);
    });
}

async function loadBooks() {
    if (unsubscribe) {
        unsubscribe();
    }

    const q = query(collection(db, "books"), orderBy("order"));
    unsubscribe = onSnapshot(q, (querySnapshot) => {
        booksCache = [];
        querySnapshot.forEach((docSnap) => {
            booksCache.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });
        renderList();
    });
}

async function swapOrder(indexA, indexB) {
    const bookA = booksCache[indexA];
    const bookB = booksCache[indexB];

    await updateDoc(doc(db, "books", bookA.id), {
        order: bookB.order
    });

    await updateDoc(doc(db, "books", bookB.id), {
        order: bookA.order
    });
    // 不再调用 loadBooks()，实时监听会自动更新
}

async function reindexOrdersAfterDelete() {
    const q = query(collection(db, "books"), orderBy("order"));
    const snapshot = await getDocs(q);

    let i = 0;
    for (const docSnap of snapshot.docs) {
        await updateDoc(doc(db, "books", docSnap.id), {
            order: i
        });
        i++;
    }
}

window.addBook = async function () {
    const input = document.getElementById("bookInput");
    const bookName = input.value.trim();

    if (bookName === "") return;

    const q = query(collection(db, "books"), orderBy("order"));
    const snapshot = await getDocs(q);
    const nextOrder = snapshot.size;

    await addDoc(collection(db, "books"), {
        name: bookName,
        done: false,
        note: "",
        order: nextOrder
    });

    input.value = "";
    // 不再调用 loadBooks()，实时监听会自动更新
};

loadBooks();
</script>

</body>
</html>
